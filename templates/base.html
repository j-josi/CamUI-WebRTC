<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_title }}</title>
    <!-- Resolve theme before CSS to prevent flash of wrong theme.
         localStorage overrides the server-side default (hybrid approach). -->
    <script>
    (function () {
        var resolved = localStorage.getItem('camui_theme') || {{ theme | tojson }};
        document.documentElement.setAttribute('data-bs-theme', resolved);
    })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">
    <script type="text/javascript" src="{{ url_for('static', filename='js/jquery-3.7.1.min.js') }}"></script>
</head>
<body> 
  {% if navbar %}
  {% include "navbar.html" %}
  <main class="pt-3" style="margin-top: 66px; margin-bottom: 110px;">
    {% else %}
    <main>
{% endif %}
  
    {% block content %}
    {% endblock %}
  </main>

  <script type="text/javascript" src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  {% if navbar %}
  <script type="text/javascript" src="{{ url_for('static', filename='js/socketio/socket.io.min.js') }}"></script>
  <script>
    (function () {
      var _batterySocket = io();
      _batterySocket.on("battery_state", function (data) {
        var pct = data.percent;
        var isDanger = pct <= 10;
        var el = document.getElementById("battery-pct");
          if (el) {
            el.textContent = pct + "%";
            el.classList.toggle("text-danger", isDanger);
          }
      });
    })();
  </script>
  {% endif %}
  <script>


document.addEventListener("DOMContentLoaded", function () {
    const serverDefault = {{ theme | tojson }};
    const themeIcon = document.getElementById("theme-icon");

    function updateThemeIcon(t) {
        if (themeIcon) themeIcon.className = t === "light" ? "bi bi-brightness-high-fill" : "bi bi-moon-stars-fill";
    }

    // Sync icon with the theme already applied by the <head> script
    updateThemeIcon(localStorage.getItem('camui_theme') || serverDefault);

    // Per-client toggle: saves to localStorage, no server call
    window.setTheme = function (newTheme) {
        localStorage.setItem('camui_theme', newTheme);
        document.documentElement.setAttribute('data-bs-theme', newTheme);
        updateThemeIcon(newTheme);
    };
});
  </script>
</body>
</html>
