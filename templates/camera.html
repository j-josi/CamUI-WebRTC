{% extends "base.html" %}
{% block content %}

<script>
// Inject local TURN server into every RTCPeerConnection for Firefox compatibility.
// Firefox obfuscates its ICE candidates with mDNS hostnames; TURN relays around this.
// Wrapping RTCPeerConnection here keeps reader.js unmodified and upgradeable.
(function () {
  const _Orig = window.RTCPeerConnection;
  window.RTCPeerConnection = function (config, ...args) {
    if (config) {
      config.iceServers = [
        ...(config.iceServers || []),
        {
          urls: [`turn:${window.location.hostname}:3478?transport=tcp`],
          username: 'camui',
          credential: 'camui',
        },
      ];
    }
    return new _Orig(config, ...args);
  };
  Object.setPrototypeOf(window.RTCPeerConnection, _Orig);
  window.RTCPeerConnection.prototype = _Orig.prototype;
}());
</script>
<script type="text/javascript" src="{{ url_for('static', filename='js/reader.js') }}"></script>
<script type="text/javascript" src="{{ url_for('static', filename='js/socketio/socket.io.min.js') }}"></script>

<div class="mx-4">
  <div class="row">
    <div class="col-lg-8 pb-2">

      <h2 class="pb-2 mb-4 border-bottom">Camera: {{ camera.Model }}</h2>

      <!-- Video Container -->
      <div id="videoFeedContainer" class="position-relative">
        <video
            id="videoFeed"
            autoplay
            muted
            playsinline
            class="w-100 d-block"
            style="object-fit:contain; aspect-ratio: 16 / 9;">
        </video>

        <!-- Video controls overlay (volume, fullscreen) — shown on mouse hover -->
        <div id="videoControls"
            class="position-absolute start-0 end-0 bottom-0
                    justify-content-between align-items-center
                    px-3 py-2
                    bg-dark bg-opacity-75 text-white shadow"
            style="display:none;">

            <!-- Volume control: icon + slider -->
            <div id="volumeContainer" class="d-flex align-items-center gap-2">

                <!-- Volume icon: click to mute/unmute -->
                <i id="volumeIcon"
                class="bi bi-volume-mute text-white"
                style="font-size:2.4rem; cursor:pointer;"></i>

                <!-- Volume slider: shown on hover over the icon -->
                <input type="range"
                    class="form-range"
                    id="volumeSlider"
                    min="0"
                    max="1"
                    step="0.01"
                    value="0"
                    style="width:100px; height:6px; display:none;">
            </div>

          <!-- Fullscreen toggle button -->
          <button id="fsBtn"
                  class="btn btn-outline-light btn-sm rounded-circle">
            <i class="bi bi-fullscreen fs-4"></i>
          </button>
        </div>

        <!-- Autoplay blocked fallback: shown if browser prevents autoplay -->
        <div id="videoOverlay"
             class="position-absolute top-0 start-0 w-100 h-100
                    align-items-center justify-content-center
                    bg-dark bg-opacity-50"
             style="display:none;">
          <button id="startButton" class="btn btn-lg btn-light">
            ▶ Stream starten
          </button>
        </div>

      </div>

      {% include "animated_logo.html" %}

      <!-- Action buttons: capture image, record video, show metadata -->
      <div class="container text-center mt-4">
        <div class="row justify-content-center g-3">

            <!-- Take Photo -->
            <div class="col-12 col-md-4">
              <button class="btn btn-lg w-100 btn-success" id="captureButton">
                  <i class="bi bi-camera fs-2"></i>
                  <span class="fw-bold mt-1 d-block">Take Photo</span>
              </button>
            </div>

            <!-- Record Video -->
            <div class="col-12 col-md-4">
              <button class="btn btn-lg w-100 btn-danger" id="recordVideoButton">
                <i id="recordVideoIcon" class="bi bi-record-circle fs-2"></i>
                <span id="recordVideoText" class="fw-bold mt-1 d-block">Record Video</span>
              </button>
            </div>

            <!-- Fetch Metadata -->
            <div class="col-12 col-md-4">
            <button class="btn btn-lg w-100 btn-secondary" id="metadataButton">
                <i class="bi bi-card-list fs-2"></i>
                <span id="metadataButtonText" class="fw-bold mt-1 d-block">Show Metadata</span>
            </button>
            </div>

            <div id="metadataDisplay" class="mt-3"></div>
        </div>
      </div>
    </div>
    <div class="col-lg-4 pb-4 overflow-y-scroll" style="height:100vh;">
      {% include "camera_controls.html" %}
    </div>
  </div>
</div>

<!-- Volume slider styling (Bootstrap-compatible, dark theme) -->
<style>
#volumeSlider {
  filter: brightness(1.2);
}

#volumeSlider::-webkit-slider-thumb {
  box-shadow: 0 0 0 0.25rem rgba(255,255,255,.25);
}

#volumeSlider::-moz-range-thumb {
  box-shadow: 0 0 0 0.25rem rgba(255,255,255,.25);
}
</style>

<script>

// -------------------------------------------------------
// DOM references and state variables
// -------------------------------------------------------
const cameraNum = JSON.parse('{{ camera.Num | tojson }}');
const video = document.getElementById("videoFeed");
const videoControls = document.getElementById("videoControls");
const videoContainer = document.getElementById("videoFeedContainer");
const overlay = document.getElementById("videoOverlay");
const startBtn = document.getElementById("startButton");
const fsBtn = document.getElementById("fsBtn");
const volumeSlider = document.getElementById("volumeSlider");
const volumeIcon = document.getElementById("volumeIcon");
const volumeContainer = document.getElementById("volumeContainer");
const recordBtn      = document.getElementById("recordVideoButton");
const metadataButton = document.getElementById("metadataButton");
const metadataButtonText = document.getElementById("metadataButtonText");
const metadataDisplay = document.getElementById("metadataDisplay");

let isRecording = false;
let reader = null;
let hideControlsTimeout = null;
let mouseOverControls = false;
let previousVolume = 0.75;
let sliderHideTimeout = null;

// -------------------------------------------------------
// WebSocket: join the room for this camera on connect
// -------------------------------------------------------
const socket = io();

socket.emit("join_camera_room", { camera_num: cameraNum });

// Apply server-pushed state to the UI whenever camera settings change
socket.on("camera_state", payload => {
    if (payload.camera_num !== cameraNum) return;
    applyStateToUI(payload.state);
});

// -------------------------------------------------------
// applyStateToUI: sync all camera settings from a state
// object received via WebSocket to the corresponding
// form elements in the settings panel
// -------------------------------------------------------
function applyStateToUI(state) {
    console.log("applyStateToUI: ", state);
    if (!state) return;

    // Config settings: hflip, vflip, saveRAW, resolutions, etc.
    if (state.configs) {
        for (const [key, value] of Object.entries(state.configs)) {
            const el = document.getElementById(key);
            if (el) {
                if (el.type === "checkbox") {
                    el.checked = Boolean(value);
                } else {
                    el.value = value;
                }
                const label = document.getElementById("current" + key);
                if (label) label.textContent = `Value: ${value}`;
            } else {
                // Fallback for radio groups: inputs use id="${key}_${value}"
                const radio = document.getElementById(`${key}_${value}`);
                if (radio && radio.type === "radio") radio.checked = true;
            }
        }
    }

    // Live controls: ExposureTime, AnalogueGain, etc.
    if (state.controls) {
        for (const [key, value] of Object.entries(state.controls)) {
            const el = document.getElementById(key);
            if (el) {
                if (el.type === "checkbox") {
                    el.checked = Boolean(value);
                } else {
                    el.value = value;
                }
                const label = document.getElementById("current" + key);
                if (label) label.textContent = `Value: ${value}`;
            } else {
                // Fallback for radio groups: inputs use id="${key}_${value}"
                const radio = document.getElementById(`${key}_${value}`);
                if (radio && radio.type === "radio") radio.checked = true;
            }
        }
    }

    // Camera states: recording active, streaming active, still capture in progress
    if (state.states) {
        if (state.states.is_video_recording !== undefined) {
            isRecording = state.states.is_video_recording;
            updateRecordButton();
        }

        if (state.states.is_video_streaming !== undefined) {
            // Optional: update a streaming status indicator if present
            const streamingIndicator = document.getElementById("streamingIndicator");
            if (streamingIndicator) {
                streamingIndicator.classList.toggle("text-success", state.states.is_video_streaming);
                streamingIndicator.classList.toggle("text-secondary", !state.states.is_video_streaming);
            }
        }

        if (state.states.is_capturing_still_image !== undefined) {
            const captureBtn = document.getElementById("captureButton");
            if (captureBtn) captureBtn.disabled = state.states.is_capturing_still_image;
        }

        // Disable all pipeline-restart settings (data-type="configs") during
        // recording or still capture — changing these requires a pipeline restart
        // which would interrupt the active recording or capture.
        const pipelineBusy = state.states.is_video_recording || state.states.is_capturing_still_image;
        if (pipelineBusy !== undefined) {
            document.querySelectorAll("[data-type='configs']").forEach(el => {
                el.disabled = pipelineBusy;
                el.closest(".mb-3")?.classList.toggle("opacity-50", pipelineBusy);
            });
        }
    }

    // Camera info: model name, etc.
    if (state.infos) {
        const modelEl = document.getElementById("cameraModel");
        if (modelEl && state.infos.model) modelEl.textContent = state.infos.model;
    }
}

// -------------------------------------------------------
// Volume slider: show on icon hover, hide after leaving
// -------------------------------------------------------
volumeIcon.addEventListener("mouseenter", () => {
  clearTimeout(sliderHideTimeout);
  volumeSlider.style.display = "block";
});

volumeContainer.addEventListener("mouseleave", () => {
  sliderHideTimeout = setTimeout(() => {
    volumeSlider.style.display = "none";
  }, 150);
});

// -------------------------------------------------------
// initReader: fetch the WebRTC stream URL and start the
// MediaMTX WebRTC reader; routes to audio stream (cam0a)
// when a USB microphone is detected
// -------------------------------------------------------
async function initReader() {
  const response = await fetch(`/video_webrtc_url/${cameraNum}`);
  const data = await response.json();

  reader = new MediaMTXWebRTCReader({
    url: data.url,
    onTrack: evt => {
      video.srcObject = evt.streams[0];
      volumeSlider.value = video.volume;
    }
  });
}

// -------------------------------------------------------
// Utility helpers
// -------------------------------------------------------

// Returns true if the video element is currently playing
function isPlaying(v) {
  return v.currentTime > 0 && !v.paused && !v.ended && v.readyState >= 3;
}

// Enable or disable a button with visual feedback
function setButtonState(button, enabled) {
    button.disabled = !enabled;
    button.classList.toggle("opacity-50", !enabled);
}

// -------------------------------------------------------
// Autoplay fallback: if the browser blocks autoplay,
// show an overlay with a manual start button
// -------------------------------------------------------
setTimeout(() => {
  if (!isPlaying(video)) overlay.style.display = "flex";
}, 800);

video.addEventListener("playing", () => overlay.style.display = "none");
startBtn.addEventListener("click", () => video.play().catch(() => {}));

// -------------------------------------------------------
// Video controls visibility: show on mouse move,
// auto-hide after 2 seconds of inactivity
// -------------------------------------------------------
videoControls.addEventListener("mouseenter", () => mouseOverControls = true);
videoControls.addEventListener("mouseleave", () => mouseOverControls = false);

function showControlsTemporarily() {
  videoControls.style.display = "flex";
  clearTimeout(hideControlsTimeout);
  hideControlsTimeout = setTimeout(() => {
    if (!mouseOverControls) videoControls.style.display = "none";
  }, 2000);
}

videoContainer.addEventListener("mousemove", showControlsTemporarily);

// -------------------------------------------------------
// Volume logic: mute/unmute on icon click, update icon
// class based on current volume level
// -------------------------------------------------------
volumeIcon.addEventListener("click", () => {
  if (!video.muted) {
    previousVolume = video.volume;
    video.muted = true;
    volumeSlider.value = 0;
    volumeIcon.className = "bi bi-volume-mute text-white";
  } else {
    video.muted = false;
    video.volume = previousVolume;
    volumeSlider.value = previousVolume;
    volumeIcon.className =
      video.volume < 0.5 ? "bi bi-volume-down text-white"
                         : "bi bi-volume-up text-white";
  }
});

volumeSlider.addEventListener("input", () => {
  video.volume = volumeSlider.value;
  video.muted = video.volume === 0;

  volumeIcon.className = video.muted
    ? "bi bi-volume-mute text-white"
    : video.volume < 0.5
      ? "bi bi-volume-down text-white"
      : "bi bi-volume-up text-white";

  if (video.volume > 0) previousVolume = video.volume;
});

// -------------------------------------------------------
// Fullscreen: toggle fullscreen on the video container
// and update the button icon accordingly.
//
// iOS Safari does not support the standard Fullscreen API
// on arbitrary elements. The only supported path is
// video.webkitEnterFullscreen() on the <video> element
// itself, which hands control to the native iOS player.
// -------------------------------------------------------
const _isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
               (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

fsBtn.addEventListener("click", () => {
  if (_isIOS) {
    if (video.webkitEnterFullscreen) video.webkitEnterFullscreen();
  } else if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (videoContainer.requestFullscreen)       videoContainer.requestFullscreen();
    else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen();
  } else {
    if (document.exitFullscreen)       document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }
  mouseOverControls = false;
  showControlsTemporarily();
});

// Standard browsers: update icon on fullscreenchange
function _onFullscreenChange() {
  const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
  fsBtn.innerHTML = isFs
    ? '<i class="bi bi-fullscreen-exit fs-4"></i>'
    : '<i class="bi bi-fullscreen fs-4"></i>';
  showControlsTemporarily();
}
document.addEventListener("fullscreenchange",       _onFullscreenChange);
document.addEventListener("webkitfullscreenchange", _onFullscreenChange);

// iOS: fullscreen events fire on the video element, not document
video.addEventListener("webkitbeginfullscreen", () => {
  fsBtn.innerHTML = '<i class="bi bi-fullscreen-exit fs-4"></i>';
});
video.addEventListener("webkitendfullscreen", () => {
  fsBtn.innerHTML = '<i class="bi bi-fullscreen fs-4"></i>';
});

// -------------------------------------------------------
// Metadata: fetch and display live camera metadata in a
// table; toggle visibility on repeated button clicks
// -------------------------------------------------------
metadataButton.addEventListener("click", () => {
    // If metadata is already visible, clear it
    if (metadataDisplay.innerHTML.trim() !== "") {
        metadataDisplay.innerHTML = "";
        metadataButtonText.textContent = "Show Metadata";
        return;
    }

    // Fetch and render metadata as a table
    fetch(`/fetch_metadata_${cameraNum}`)
        .then(r => r.json())
        .then(data => {
            let html = `<table class="table mt-3 table-hover">
                <thead><tr><th>Parameter</th><th>Value</th></tr></thead><tbody>`;
            for (const [k,v] of Object.entries(data)) html += `<tr><td>${k}</td><td>${v}</td></tr>`;
            html += "</tbody></table>";
            metadataDisplay.innerHTML = html;
            metadataButtonText.textContent = "Hide Metadata";
        });
});

// -------------------------------------------------------
// Image capture: WebSocket-driven flow
//
// 1. capture_start — emitted by server before capture begins
//    (stream goes down at this point): close reader immediately
//    and show overlay; do NOT call initReader yet
//
// 2. capture_done  — emitted by server after capture completes
//    (stream is coming back up): call initReader and hide overlay
//    as soon as the video starts playing
//
// Both events are emitted before/after the actual still capture
// so the overlay timing matches the real camera state transition.
// -------------------------------------------------------
document.getElementById("captureButton").addEventListener("click", function(event) {
    event.preventDefault();
    socket.emit("capture_still", { camera_num: cameraNum });
});

socket.on("capture_start", (data) => {
    if (data.camera_num !== cameraNum) return;
    setButtonState(document.getElementById("captureButton"), false);
    setButtonState(recordBtn, false);
    reader?.close();
    showOverlay();
});

socket.on("capture_done", (data) => {
    if (data.camera_num !== cameraNum) return;
    initReader();
    const captureBtn = document.getElementById("captureButton");
    // Fallback: hide overlay after 10s if video.playing never fires
    const fallback = setTimeout(() => {
        hideOverlay();
        setButtonState(captureBtn, true);
        setButtonState(recordBtn, true);
    }, 10000);
    video.addEventListener("playing", function onPlaying() {
        clearTimeout(fallback);
        hideOverlay();
        setButtonState(captureBtn, true);
        setButtonState(recordBtn, true);
        video.removeEventListener("playing", onPlaying);
    });
});

// -------------------------------------------------------
// Stream reinit: emitted by server after a pipeline restart
// (e.g. resolution change). The stream is already down when
// this event arrives, so initReader is called immediately.
// Overlay is hidden as soon as the video starts playing.
// -------------------------------------------------------
socket.on("stream_reinit", (data) => {
    if (data.camera_num !== cameraNum) return;
    reader?.close();
    showOverlay();
    setButtonState(document.getElementById("captureButton"), false);
    setButtonState(recordBtn, false);
    initReader();
    // Fallback: hide overlay after 10s if video.playing never fires
    const fallback = setTimeout(() => {
        hideOverlay();
        setButtonState(document.getElementById("captureButton"), true);
        setButtonState(recordBtn, true);
    }, 10000);
    video.addEventListener("playing", function onPlaying() {
        clearTimeout(fallback);
        hideOverlay();
        setButtonState(document.getElementById("captureButton"), true);
        setButtonState(recordBtn, true);
        video.removeEventListener("playing", onPlaying);
    });
});

// -------------------------------------------------------
// Video recording
// -------------------------------------------------------
function startVideoRecording() {
  socket.emit("start_recording", { camera_num: cameraNum });
}

function stopVideoRecording() {
    fetch(`/stop_recording/${cameraNum}`)
        .then(r => r.json())
        .catch(err => console.error(err));
}

// Update the record button appearance based on the current recording state
function updateRecordButton() {
    const icon = document.getElementById("recordVideoIcon");
    const text = document.getElementById("recordVideoText");

    if (isRecording) {
        recordBtn.classList.remove("btn-danger");
        recordBtn.classList.add("btn-warning");

        icon.classList.remove("bi-record-circle");
        icon.classList.add("bi-stop-circle");

        text.textContent = "Stop Recording";
    } else {
        recordBtn.classList.remove("btn-warning");
        recordBtn.classList.add("btn-danger");

        icon.classList.remove("bi-stop-circle");
        icon.classList.add("bi-record-circle");

        text.textContent = "Record Video";
    }
}

recordBtn.addEventListener("click", () => {
    const captureBtn = document.getElementById("captureButton");

    if (isRecording) {
        stopVideoRecording();
    } else {
        startVideoRecording();
        // Disable capture button while recording is active
        setButtonState(captureBtn, false);
    }
});

// -------------------------------------------------------
// Cleanup and startup
// -------------------------------------------------------
window.addEventListener("beforeunload", () => reader?.close());

initReader();
video.volume = 0;
</script>

{% endblock %}
