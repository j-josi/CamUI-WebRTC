<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
    <title>{{ project_title }}</title>
    <!-- Resolve theme before CSS to prevent flash of wrong theme.
         localStorage overrides the server-side default (hybrid approach). -->
    <script>
    (function () {
        var resolved = localStorage.getItem('camui_theme') || {{ theme | tojson }};
        document.documentElement.setAttribute('data-bs-theme', resolved);
    })();
    </script>
    <!-- i18n: set server default lang, then load translation file synchronously -->
    <script>window._i18nDefaultLang = {{ default_lang | tojson }};</script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap-icons.css') }}">
    <script type="text/javascript" src="{{ url_for('static', filename='js/jquery-3.7.1.min.js') }}"></script>
</head>
<body> 
  {% if navbar %}
  {% include "navbar.html" %}
  <main class="pt-3" style="margin-top: 66px; margin-bottom: 110px;">
    {% else %}
    <main>
{% endif %}
  
    {% block content %}
    {% endblock %}
  </main>

  <script type="text/javascript" src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  <script src="{{ url_for('static', filename='hls.min.js') }}"></script>
  {% if navbar %}
  <script type="text/javascript" src="{{ url_for('static', filename='js/socketio/socket.io.min.js') }}"></script>
  <script>
    (function () {
      var _batterySocket = io();
      _batterySocket.on("battery_state", function (data) {
        var pct = data.percent;
        var runtime = data.runtime_remaining;
        var isDanger = pct <= 10;

        document.querySelectorAll(".battery-pct").forEach(function (el) {
          el.textContent = pct + "%";
          el.classList.toggle("text-danger", isDanger);
        });

        document.querySelectorAll(".battery-display").forEach(function (el) {
          el.classList.toggle("text-danger", isDanger);
        });

        if (runtime != null) {
          var h = Math.floor(runtime / 60);
          var m = Math.round(runtime % 60);
          var fmt = (window.t && window.t('navbar.battery_runtime')) || 'Estimated runtime: {h}h {m}min';
          var title = fmt.replace('{h}', h).replace('{m}', String(m).padStart(2, '0'));
          document.querySelectorAll(".battery-display").forEach(function (el) {
            var tip = bootstrap.Tooltip.getInstance(el);
            if (tip) {
              tip.setContent({ '.tooltip-inner': title });
            } else {
              el.setAttribute("title", title);
              new bootstrap.Tooltip(el);
            }
          });
        }
      });
    })();
  </script>
  {% endif %}
  <script>


document.addEventListener("DOMContentLoaded", function () {
    const serverDefault = {{ theme | tojson }};
    const themeIcon = document.getElementById("theme-icon");

    function updateThemeIcon(t) {
        if (themeIcon) themeIcon.className = t === "light" ? "bi bi-brightness-high-fill" : "bi bi-moon-stars-fill";
    }

    // Sync icon with the theme already applied by the <head> script
    updateThemeIcon(localStorage.getItem('camui_theme') || serverDefault);

    // Per-client toggle: saves to localStorage, no server call
    window.setTheme = function (newTheme) {
        localStorage.setItem('camui_theme', newTheme);
        document.documentElement.setAttribute('data-bs-theme', newTheme);
        updateThemeIcon(newTheme);
    };

    // Show current language code next to the translate icon
    const langCodeEl = document.getElementById("lang-code");
    if (langCodeEl && window._i18nLang) {
        langCodeEl.textContent = window._i18nLang.toUpperCase();
    }
});
  </script>
</body>
</html>
