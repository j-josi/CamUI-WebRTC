# coturn — local TURN server for WebRTC / MediaMTX
listening-port=3478
listening-ip=0.0.0.0


# Realm
realm=camui.local

# Static credentials used by MediaMTX and passed to browsers
lt-cred-mech
user=camui:camui

# Allow relaying to private/local IP ranges (needed for LAN use)
allowed-peer-ip=192.168.0.0-192.168.255.255
allowed-peer-ip=10.0.0.0-10.255.255.255
allowed-peer-ip=172.16.0.0-172.31.255.255

# No TLS needed on a local/trusted network
no-tls
no-dtls

# Suppress CLI (not needed)
no-cli

# Logging
syslog
verbose
no-rfc5780
no-stun-backward-compatibility
response-origin-only-with-rfc5780
